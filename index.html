<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech - Novo Lançamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fintech-dark': '#131415',
                        'fintech-card': '#1a1b1e',
                        'fintech-green': '#00e640',
                        'fintech-yellow': '#f4cf45',
                        'fintechGreen': '#00e640'
                    }
                }
            }
        }
    </script>
    <style>
        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
    </style>
</head>
<body class="bg-fintech-dark text-white font-sans min-h-screen flex flex-col md:flex-row">

<aside class="bg-[#1a1b1e] md:w-24 w-full flex md:flex-col flex-row items-center justify-around md:justify-start md:py-10 py-2 md:space-y-8 rounded-b-3xl md:rounded-b-none md:rounded-r-[35px] z-20 shadow-2xl border-r border-gray-800/30 fixed bottom-0 md:relative">
    
    <button class="w-full flex justify-center py-2 text-gray-500 hover:text-gray-300 transition relative">
        <span class="material-icons-outlined text-3xl">home</span>
    </button>
    
    <button class="w-full flex justify-center py-2 text-gray-500 hover:text-gray-300 transition relative">
        <span class="material-icons-outlined text-3xl">table_chart</span>
    </button>
    
    <div class="w-full flex justify-center py-2 relative bg-green-950/20 md:bg-transparent">
        <span class="absolute md:left-0 md:top-0 md:h-full md:w-1 top-0 left-0 w-full h-1 bg-fintechGreen rounded-full"></span>
        
        <button class="text-fintechGreen transition flex items-center justify-center relative p-1 md:p-2 md:bg-green-950/30 rounded-xl pr-5">
            <span class="material-icons-outlined text-3xl">add</span>
            <span class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_8px_rgba(59,130,246,0.8)]"></span>
        </button>
    </div>

    <button class="w-full flex justify-center py-2 text-red-600/70 hover:text-red-500 transition relative">
        <span class="material-icons-outlined text-3xl">remove_circle_outline</span>
    </button>
    
    <button class="w-full flex justify-center py-2 text-gray-500 hover:text-gray-300 transition relative">
        <span class="material-icons-outlined text-3xl">list</span>
    </button>
    
    <button class="w-full flex justify-center py-2 text-gray-500 hover:text-gray-300 transition relative md:mt-auto">
        <span class="material-icons-outlined text-3xl">manage_accounts</span>
    </button>
</aside>

    <main class="flex-1 p-6 md:p-12 flex flex-col justify-between relative mb-20 md:mb-0">
        
        <div class="absolute inset-0 flex items-center justify-center opacity-5 pointer-events-none overflow-hidden">
            <span class="material-icons-outlined text-[400px] text-fintech-green">trending_up</span>
        </div>

        <div class="flex justify-end w-full mb-6">
            <div class="relative">
                <input type="text" class="bg-fintech-card border border-gray-700 rounded-full py-1 px-4 text-sm focus:outline-none focus:border-fintech-green w-40 transition">
                <span class="material-icons-outlined text-gray-500 text-sm absolute right-3 top-2">search</span>
            </div>
        </div>

        <div class="max-w-2xl w-full mx-auto my-auto z-10">
            <h1 class="text-2xl md:text-3xl font-bold text-fintech-yellow leading-tight">Novo Lançamento</h1>
            <h2 class="text-3xl md:text-4xl font-extrabold text-fintech-green mb-8">Receita</h2>

            <form class="space-y-6">
                <div>
                    <label class="block text-fintech-green text-sm font-semibold mb-2">Descrição</label>
                    <input type="text" placeholder="Digite aqui a descrição da sua receita" class="w-full bg-fintech-card border border-gray-700 rounded-full py-3 px-6 text-gray-300 focus:outline-none focus:border-fintech-green transition">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-fintech-green text-sm font-semibold mb-2">Valor</label>
                        <div class="relative">
                            <input type="text" placeholder="R$0,00" class="w-full bg-fintech-card border border-gray-700 rounded-full py-3 px-6 text-gray-300 focus:outline-none focus:border-fintech-green transition">
                            <span class="material-icons-outlined text-gray-500 absolute right-4 top-3.5">calculate</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-fintech-green text-sm font-semibold mb-2">Categoria</label>
                        <div class="relative">
                            <select class="w-full bg-fintech-card border border-gray-700 rounded-full py-3 px-6 text-gray-300 focus:outline-none focus:border-fintech-green appearance-none transition">
                                <option>Proventos</option>
                                <option>Salário</option>
                                <option>Investimentos</option>
                            </select>
                            <span class="material-icons-outlined text-gray-500 absolute right-4 top-3.5 pointer-events-none">expand_more</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
                    <div>
                        <label class="block text-fintech-green text-sm font-semibold mb-2">Data</label>
                        <div class="relative">
                            <input type="text" placeholder="18/06/2026" class="w-full bg-fintech-card border border-gray-700 rounded-full py-3 px-6 text-gray-300 focus:outline-none focus:border-fintech-green transition">
                            <span class="material-icons-outlined text-gray-500 absolute right-4 top-3.5">calendar_month</span>
                        </div>
                    </div>

                    <div class="flex items-center space-x-3 pt-6 md:pt-8">
                        <input type="checkbox" id="checkbox-recorrente" class="w-5 h-5 accent-fintech-green bg-fintech-card border-gray-700 rounded focus:ring-0">
                        <label for="checkbox-recorrente" class="text-fintech-green text-sm font-semibold cursor-pointer">Recorrente?</label>
                    </div>
                </div>

                <div id="campos-recorrencia" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 p-5 border border-gray-800 bg-[#161719] rounded-2xl">
                    <div>
                        <label class="block text-fintech-green text-sm font-semibold mb-2">Frequência</label>
                        <div class="relative">
                            <select class="w-full bg-fintech-card border border-gray-700 rounded-full py-3 px-6 text-gray-300 focus:outline-none focus:border-fintech-green appearance-none transition">
                                <option>Mensalmente</option>
                                <option>Anualmente</option>
                                <option>Semanalmente</option>
                            </select>
                            <span class="material-icons-outlined text-gray-500 absolute right-4 top-3.5 pointer-events-none">expand_more</span>
                        </div>
                    </div>

                    <div>
                        <label class="block text-fintech-green text-sm font-semibold mb-2">Quantidade de vezes</label>
                        <input type="number" min="1" placeholder="Ex: 12" class="w-full bg-fintech-card border border-gray-700 rounded-full py-3 px-6 text-gray-300 focus:outline-none focus:border-fintech-green transition">
                    </div>
                </div>
            </form>
        </div>

        <div class="flex justify-end space-x-6 w-full max-w-2xl mx-auto mt-8 z-10">
            <button class="text-gray-400 hover:text-white p-3 rounded-full hover:bg-gray-800 transition flex items-center justify-center">
                <span class="material-icons-outlined text-3xl">cleaning_services</span>
            </button>
            <button class="bg-green-900/40 text-fintech-green border-2 border-fintech-green p-3 rounded-2xl hover:bg-fintech-green hover:text-black transition flex items-center justify-center shadow-lg shadow-green-950/50">
                <span class="material-icons-outlined text-3xl">save</span>
            </button>
        </div>

    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const checkboxRecorrente = document.getElementById('checkbox-recorrente');
            const camposRecorrencia = document.getElementById('campos-recorrencia');

            if (checkboxRecorrente && camposRecorrencia) {
                checkboxRecorrente.addEventListener('change', function() {
                    if (this.checked) {
                        camposRecorrencia.classList.remove('hidden');
                    } else {
                        camposRecorrencia.classList.add('hidden');
                    }
                });
            }
        });
    </script>

</body>
</html>
